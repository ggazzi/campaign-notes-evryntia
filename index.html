t;^19logseq____&quot;,logseq____&quot;Lugares, [[Lago Proibido]]logseq____&quot;],536870917]],[logseq____&quot;^17logseq____&quot;,[470,logseq____&quot;^Ilogseq____&quot;,587,536870917]],[logseq____&quot;^17logseq____&quot;,[470,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[470,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u902a71ab-818e-4796-bf7a-ed07529da91dlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[471,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Fechando um Portal\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[471,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[471,logseq____&quot;^Glogseq____&quot;,467,536870917]],[logseq____&quot;^17logseq____&quot;,[471,logseq____&quot;^Zlogseq____&quot;,467,536870917]],[logseq____&quot;^17logseq____&quot;,[471,logseq____&quot;^Xlogseq____&quot;,467,536870917]],[logseq____&quot;^17logseq____&quot;,[471,logseq____&quot;^Wlogseq____&quot;,467,536870917]],[logseq____&quot;^17logseq____&quot;,[471,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[471,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc81-646e-4ff0-9c0a-6da84efc2ed0logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[472,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Começamos a sessão subindo para a sala do altar no [[id:902a71ab-\\nA \\logseq____&quot;estática\\logseq____&quot; vindo do portal é muito presente, nos sentimos até um \\nPerguntada sobre ele, Ariadne reitera que é uma ferida planar.\\nEla começa o ritual necessário para fechar a ferida, e percebemos o portal reagindo e aparentemente resistindo esses esforços.\\n\\nOuvimos mais barulhos vindo de dentro dele e vemos tentáculos.\\nSai a parte de baixo de um polvo do portal, mas em vez de uma boca ele tem um olho, assim como nas pontas de seus tentáculos.\\nApesar disso, Ariadne continua concentradíssima em seu ritual.\\n\\nConseguimos ocupar o monstro enquanto Ariadne se concentra, inclusive com um grito consigo afastá-lo da Ariadne e o encurralamos em uma pequana câmara lateral.\\nNisso, ele foca o olho de um tentáculo em Chonk, que parece agarrado por um força invisível e levantado no ar.\\nOutro tentáculo foca em Ariadne, mas ela continua em sua concentração, mesmo após seu nariz também começar a sangrar.\\nUm terceiro foca em Dare, que leva as mãos à cabeça com uma expressão de dor, começando a sangrar do nariz e ouvidos.\\nEle consegue fugir para fora da visão do polvo, que vira para Lucky.\\nOs olhos dela ficam vidrados e ela não se move por um tempo.\\n\\nDare se aproxima de novo e tenta atacar a criatura, mas parece estar se desequilibrando e errando os golpes.\\nFrustrado e machucado, Dare larga sua espada, sacando um escudo e um martelo.\\nEm sua fúria, acerta o monstro com toda sua força e arranca um dos tentáculos.\\n\\nAriadne consegue terminar de fechar o portal, mas está visivelmente abatida.\\nO monstro continua nos ameaçando, mas Dare logo consegue amassar o restante do corpo dele.\\n\\nInterpretação dramática: o guerreiro lutando com uma espada amaldiçoada que herdou de seu amado pai, teve que destruir sua herança para ser vitorioso.\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[472,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[472,logseq____&quot;^Glogseq____&quot;,471,536870917]],[logseq____&quot;^17logseq____&quot;,[472,logseq____&quot;^Zlogseq____&quot;,467,536870917]],[logseq____&quot;^17logseq____&quot;,[472,logseq____&quot;^Xlogseq____&quot;,471,536870917]],[logseq____&quot;^17logseq____&quot;,[472,logseq____&quot;^Wlogseq____&quot;,467,536870917]],[logseq____&quot;^17logseq____&quot;,[472,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[472,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc81-96e9-4473-8de9-35c146840a00logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Observações Edificantes\\n\\nAriadne avisa que esse portal é apenas o primeiro, que mais surgirão.\\nEra sabido que o primeiro surgiria nesse [[id:902a71ab-818e-4796-bf7a-ed07529da91d][templo]], mas a partir de agora podem aparecer em qualquer lugar.\\n\\nEla nos leva através de um portal. Emergimos um um local com céu noturno, mas as estrelas parecem verdes. Há um caminho de pedra com cores estranhas. À nossa frente uma torre enorme, cujo topo não conseguimos ver. Atrás de nós há um penhasco, notamos que a ilha flutua. Ariadne diz \\logseq____&quot;Bem vindos a Turmion\\logseq____&quot;. É um lugar no limiar entre planos.\\n\\nTodas as pessoas que vemos aqui vestem trajes brancos e um medalhão dourado, com expressões serenas. Vemos tieflings e criaturas semelhantes, porém aparentemente elementais/naturais (e.g., meio planta, meio vulcânica...).\\n\\nLucky puxa papo com a criatura de madeira, que se chama [[brieles]] . Perguntada sobre o que eles são, diz que são \\logseq____&quot;Observadores\\logseq____&quot;. Ri e diz a Ariadne que claramente não falamos com o cara que precisamos falar.\\nDe vez em quando vemos criaturas mundanas, mas são claramente a minoria.\\n\\nNa porta da torre tem uma Tiefling azul estranhamente animada: [[id:1f5af35a-d5a4-4c29-8396-60a3b66c213e][Chandri]]. Ela está frustrada que o lugar é muito chato e feliz que é uma batedora, então pode sair de lá.\\n\\nEntrando na torre, subimos por uma escada espiral subindo por muitos andares antes de vermos o domo da torre, ao longe. Ariadne nos leva ao centro da torre, que é um elevador mágico, e diz que [[id:ced5372e-f547-43ca-bd8f-d9125e203a4a][Eulália]] vai nos explicar tudo. Subimos até o topo. Olhando pelas janelas, se vê o ambiente meio alienígena, com ainda mais ilhas flutuando. Entramos em uma sala que parece ser um semi-plano, com um céu estrelado dentro dela mesmo. Sentada num \\logseq____&quot;trono\\logseq____&quot; no fundo da sala está Eulália, parece feita de escuridão mas com detalhes dourados na pele.\\n\\nEla diz que é Galtir do dragão dourado, e ao contrário dos outros Galtir ela é a primeira e será a última.\\nNos dá uma aula de cosmologia, usando a analogia de uma árvore.\\nEla está toda em perigo pois a segunda dimensão está se conectando com a nossa, e deveria ser só acessível como transição após a morte.\\nEsse desequilíbrio teria sido criado após o fim do período de graça em que todos viviam em harmonia.\\nApós o fim da harmonia, o desequilíbrio começou e apenas cresceu.\\nO desequilíbrio tem a ver com a disputa por poder e riquezas, a criação de inimizade.\\n\\nO templo onde passamos seria onde o dragão dividiu a jóia da criação em quatro e deu aos seus filhos.\\nComo observadores, aparentemente eles não podem interferir diretamente.\\n\\nAparentemente para resolver o problema de fato é necessário reunir as quatro jóias da criação que estão com os galtires.\\nGaltires acessam um pedaço da consciência dos respectivos deuses.\\n\\nDare pergunta sobre como isso pode funcionar, e de fato vai ser difícil pois os Galtir podem não querer abrir mão.\\nComo são joias de grande poder, só a ameaça de possuí-las é um fator importante nos conflitos entre esses países.\\n\\nToda vez que fechamos um portal, um \\logseq____&quot;medalhão do destino\\logseq____&quot; coleta uma certa energia que pode nos ajudar.\\nPodemos acessar isso com \\logseq____&quot;anéis filhos\\logseq____&quot; desse medalhão.\\n\\nA névoa mágica que esconde esse lugar causa o esquecimento quando uma criatura sai de lá. Nós recebemos uma runa que nos protege disso, mas ficamos proibidos magicamente, fisicamente incapazes de passer informações sobre Turmion e Eulália. Mas podemos falar sobre o problema do mundo se desfazendo.\\n\\nNos retiramos para descansar e pensar se queremos aceitar essa missão.\\nVamos para a janta e é de fato tão chato quanto [[id:1f5af35a-d5a4-4c29-8396-60a3b66c213e][Chandri]] tinha falado, nem a comida tem muito gosto.\\n\\nNos reunimos para tomar decisões. Confabulamos sobre a ordem dos lugares, os irmãos me contam parte do seu passado (gangue de rinha de autômatos em [[id:29b53953-6a17-42ac-83c5-eb9ef460c572][Alabaster]], foi atacada e após a fuga os irmãos estavam sendo perseguidos). Decidimos tentar focar em [[id:e0cf71c7-786c-4154-8b87-e57ceeb6f7b7][Gaelyra]] primeiro. Depois disso vamos dormir.\\n\\nNo dia seguinte, Ariadne nos leva de volta a Eulália. Quando eu falo na cabeça dos irmãos, ela também ouve e responde. Consultando ela sobre nossos planos, ela concorda que Idrarus e Khreven são os casos mais difíceis. Com Ida talvez seja possível até negociar. Depois, descemos para outro andar da torre onde recebemos as tatuagens. [[Brieles]] é o nosso tatuador. Também nos dá os anéis do destino, inclusive um extra para Chonk. Ariadne pega anéis extra caso outros aventureiros se juntem a nós.\\n\\nO anel nos dá a magia \\logseq____&quot;Speak with Allies\\logseq____&quot;.\\n\\nTodos passam para nível 4.logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Glogseq____&quot;,472,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Zlogseq____&quot;,467,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Xlogseq____&quot;,471,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Wlogseq____&quot;,436,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Wlogseq____&quot;,467,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Ilogseq____&quot;,436,536870917]],[logseq____&quot;^17logseq____&quot;,[473,logseq____&quot;^Ilogseq____&quot;,458,53687 ;^17logseq____&quot;,[482,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Traídos na Taverna\\n\\nDescemos na taverna e vemos Ariadne já por lá.\\nAriadne pergunta de Jane e Hupfn, estranha que els ainda não desceram.\\nEu vou com ela investigar, ela visivelmente alarmada.\\nNisso, ela me mostra qual o quarto que ela geralmente usa, no fim do corredor do primeiro andar.\\n\\nQuando entramos no quarto de Jane, vemos uma bagunça com sinais de struggle.\\nAriadne fica visivelmente estarrecida e não consegue fazer nada por alguns momentos.\\nLucky e Dare se juntam a nós e vamos olhar também o quarto de Hupfn.\\nLá, vemos um quarto intacto porém vazio. Não há sinais de ter sido habitado: ou ele não passou no quarto, ou se esforçou para apagar qualquer indício da sua presença.\\nTambém não há sinais de magia no quarto dele.\\n\\nLucky nota, no quarto de Jane, que ela parece ter sido tirada à força da cama.\\nEla avisa que viu um rastro de abjuração no quarto inteiro, e que a porta parece ter sido lockpicked de uma maneira muito competente.\\nPerguntamos se teria alguém a essa hora da noite vigiando a taverna.\\nSeria Diran, mas se for muito tarde nem ele seria.\\nAriadne também investiga o quarto de Jane e encontra uma pegada de anão.\\n\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[482,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[482,logseq____&quot;^Glogseq____&quot;,481,536870917]],[logseq____&quot;^17logseq____&quot;,[482,logseq____&quot;^Zlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[482,logseq____&quot;^Xlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[482,logseq____&quot;^Wlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[482,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[482,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc81-5fe3-4022-baa8-7399ca103a07logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[483,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Coletando nosso Cachê\\n\\nDiscutindo nosso pagamento, Ariadne nos garante que cobre nosso preço.\\nDecidimos buscar nosso pagamento e nos preparar para a aventura, depois encontrar Lyanna na\\ntaverna.\\nAriadne propõe que a gente fique com o crédito e o pagamento.\\nPerguntada sobre a comissão da irmandade, ela fala que não precisa pois eles já recebem suas doações, mas estava claramente omitindo alguma fonte de renda.\\n\\nChegando no conselho da cidade, somos recebidos por Gertrudes.\\nEla nos pede para esperar, pois Liam está em uma reunião.\\nDepois de uma meia hora, sai um grupo de pescadores da sala e Gertrudes nos manda lá.\\n\\nContamos a nossa aventura para Liam, que acredita nos nossos \\logseq____&quot;embelezamentos\\logseq____&quot;.\\nRecebemos nosso pagamento (50gp/pessoa) e conseguimos negociar um pagamento de 300gp/pessoa para resolver o problema.\\nApesar de relutante, Liam acaba por aceitar e até nos dá um adiantamento de 100gp/pessoa.\\n\\nVamos na loja de aventureiros e somos cumprimentados por Miria, que está muito feliz em ter algum freguês apesar da crise. Não conseguimos negociar um desconto. Vamos ao ferreiro Lenny para os irmãos buscarem equipamento.\\n\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[483,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[483,logseq____&quot;^Glogseq____&quot;,482,536870917]],[logseq____&quot;^17logseq____&quot;,[483,logseq____&quot;^Zlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[483,logseq____&quot;^Xlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[483,logseq____&quot;^Wlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[483,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[483,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc81-3376-4139-93a7-c84169c71707logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Uma Aventura com Ariadne\\n\\nEncontramos Ariadne na taverna.\\nEla avisa que precisamos ir para a casa dela, que fica a uns dois dias de distância da cidade.\\nEla oferece usar um colar que ela tem, que pode nos transportar para a casa dela uma vez (e nunca mais).\\nDecidimos fazer isso para evitar emboscadas no caminho.\\n\\nChegamos na casa dela, que é uma cabana relativamente modesta.\\nEstamos em uma sala com um círculo rúnico claramente ativo.\\nNa parede há um mural de um dragão dourado.\\nChonky parece agitado com o que está acontecendo fora da cabana.\\nAriadne explica que a casa dela fica numa pequena floresta com peculiaridades semelhantes ao lago, e provavelmente haja alguma criatura fora da casa.\\nLucky pergunta se ela está okay com isso, e Ariadne responde que há proteções.\\n\\nLucky me dá uma vela que emite luz sem nem estar ativa.\\nDamos as mãos mais uma vez e somos transportados para outro lugar.\\nChegamos num lugar gramado, enevoado e com até cheiro de umidade.\\nNos deparamos com um portal/arco meio em ruínas.\\nAtrás de nós tem a orla de algum corpo de água, nos dá a impressão de estarmos em uma ilha.\\nO local está banhado pela luz branca da lua, bastante intensa.\\n\\nLucky confirma com Ariadne que estamos em uma ilha no meio lago.\\nÉ um [[id:902a71ab-818e-4796-bf7a-ed07529da91d][templo]] que aparentemente é \\logseq____&quot;do início e do fim\\logseq____&quot;, e é nele que fica a fonte das criaturas.\\nDecidimos entrar nas ruínas, onde há poças de água cristalina.\\nLucky manda o Small para reconhecer o terreno, olhando pelos olhos dele.\\nAriadne avisa que a fonte deve estar no segundo andar.\\n\\nComeçamos a atravessar a sala pela lateral, evitando a água.\\nOlhando por small, Lucky enxerga duas gárgulas.\\nPerguntando para Ariadne, ela fica surpresa pois não haviam gárgulas aqui.\\nSuspeitamos que isso seja uma emboscada e Lucky faz as tochas ficarem mais fortes.\\nNisso, ambas as \\logseq____&quot;gárgulas\\logseq____&quot; abrem o seu 01 olho.\\nCom leve dificuldade e cuidado para não gastar muitos recursos, conseguimos matar os dois.\\n\\nLucky manda Small subir ao andar de cima através de um dos buracos no teto.\\nEle vê dois(?) círculos de teleportação, além de um enorme buraco no tecido da realidade que parece estar despejando algo/alguma energia. Ariadne chama isso de ferida planar.\\nAriadne é uma das poucas pessoas que consegue, com ajuda de um medalhão, absorver essa energia e remendar a ferida.\\nEssa é a primeira dessas feridas, segundo Ariadne, e mais virão.\\n\\nComeçamos a subir para o segundo andar e conseguimos sentir os efeitos do buraco.\\n\\n(Nota: Dare terminou com uma inspiração bárdica por mais ~9 minutos)\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^Glogseq____&quot;,483,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^Zlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^Xlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^Wlogseq____&quot;,475,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^Ilogseq____&quot;,470,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[484,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc81-ec36-49c1-bb7b-47533548912alogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[486,logseq____&quot;^Mlogseq____&quot;,1668888347870,536870918]],[logseq____&quot;^17logseq____&quot;,[486,logseq____&quot;^Plogs 98b-2f15-49e3-8c3b-71b3309541f6][Taverna das Graças]]. Decidimos ir pra lá almoçar.\\nEntrando, encontramos [[id:c0af6640-808a-4266-97a2-2097c0cb7af2][Hupfn Darkbrew]], \\logseq____&quot;da famosa [[id:07f28fe3-1051-4592-bd45-98e6096c213c][tribo Darkbrew]]\\logseq____&quot;, diz que fica a 15 dias de viagem de Idrarus. A tribo dele foi atacada quando ele era jovem e desde então ele vaga por florestas, aparentemente tinha vários instrumentistas nela também..\\nEle parece interessado em ajudar contra os monstros por motivos nobres.\\n\\nLucky é pouco estratégica na conversa, falando sobre dinheiro e sobre ele ficar na linha de frente.\\nEu falo na cabeça dela para ela não falar disso no momento.\\nDurante o almoço ela fica olhando desconfiada para mim.\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^Glogseq____&quot;,493,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^Zlogseq____&quot;,486,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^Xlogseq____&quot;,486,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^Wlogseq____&quot;,486,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^Ilogseq____&quot;,487,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^Ilogseq____&quot;,492,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^Ilogseq____&quot;,494,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[488,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc81-079d-4bc5-8142-1aa2a312aa12logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[489,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Investigando no Cemitério de [[Graymire]] \\n\\nChegamos no cemitério, que é médio, mas é totalmente visível de qualquer ponto dele.\\nHá duas pessoas ali, um senhor e um jovem, trabalhando.\\n\\nO senhor é o Ian, o coveiro, que nos leva às duas covas de onde saíram os mortos-vivos. Os nomes mais próximos são Percival Doric, (perguntar os outros dois p/ Conrado). Fica no canto do cemitério, onde pessoas mais pobres são enterradas. Ambos os zumbis eram indigentes anônimos, mortos há pouco tempo. Parecia que foram incitadas a atacar, com garras e mordidas. Os chants que ele ouviu antes vieram do centro do cemitério, onde há uma capela. Não há nada de interessante nos buracos de onde saíram os mortos-vivos. Os demais túmulos na volta não tem nenhum sinal de algo estranho.\\nOs mortos-vivos foram levados para a [[id:5aaf62f8-d844-4a04-bfbb-401ee8a19ce8][Escola de Mitos e Lendas]].\\nO moço jovem chama Leandro, é neto do Ian e o está ajudando em vez de trabalhar como sempre na venda de legumes da família.\\n\\nVamos investigar a capela, Dare e Lucky primeiro.\\nÉ uma pequena sala com um altar de Anahita com velas e um alçapão que desce para um ossuário.\\nInvestigando a capela, Dare encontra um rastro de gosma, parece pingado de uma criatura média, inclusive adjacente ao alçapão.\\nPerto do teto parece que houve algo empoleirado, também há rastros de gosma por ali.\\nA gosma é verde e tem cheiro de morte.\\nLucky detecta magias na sala e vê resquícios de conjuração com traços de necromancia próximo ao teto.\\nDare e Hupfn descem pelo alçapão e vêem o ossuário, não há nada de interessante nem traço de magia lá.\\n\\nDecidimos ficar meio escondidos observando durante a noite.\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[489,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[489,logseq____&quot;^Glogseq____&quot;,488,536870917]],[logseq____&quot;^17logseq____&quot;,[489,logseq____&quot;^Zlogseq____&quot;,486,536870917]],[logseq____&quot;^17logseq____& foram investigados por [[id:1a949eff-033b-417d-b1da-136d666b0f09][Eruan]], era o cadáver de uma moça que morreu há mais.\\nOs ataques foram aparentemente todos à noite.\\n\\nPagamento é 150gp no mínimo, mais dinheiro dependendo do que for enfrentado.\\n\\nDiscutimos isso entre nós e decidimos aceitar a oferta. Se parecer meio ruim, vamos enrolar a investigação e arranjar dinheiro extra por meios alternativos.\\nAssinamos um contrato como \\logseq____&quot;Os Vingativos\\logseq____&quot;, recebemos também uma carta de introdução do conselho.logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^Glogseq____&quot;,503,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^Zlogseq____&quot;,499,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^Xlogseq____&quot;,499,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^Wlogseq____&quot;,499,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^Ilogseq____&quot;,453,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^Ilogseq____&quot;,490,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^Ilogseq____&quot;,505,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[502,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc81-6291-4837-bd0c-7f2e7c90a7adlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[503,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Recrutados no Caminho\\n\\nNuma taverna em [[id:444367d9-562a-4ed6-baa0-d74633f88409][Hibok]] eu cantei nossa aventura, fomos abordados por [[id:38252bb0-ca62-487b-b71a-beac10bcbcea][Nisos]], vindo de [[id:874229de-7601-41d8-9d0d-298b06eb4820][Graymire]].\\nHá poucas semanas tem ataques de criaturas não reconhecidas, atacaram até a cidade.\\nSão meio aberrações, meio com tentáculos, alguma inclusive sobrevoou o mercado.\\nUma pessoa morreu no pier. Também houve gente ferida, uma perto do cemitério, onde também tinha algo undead.\\n\\nNisos nos recruta para investigar e descobrir a origem das criaturas, se possível acabar com elas.\\nO pagamento vai ser feito pelo conselho da cidade, ele nos acompanharia até a cidade.\\nAceitamos fazer isso e viajamos por 5 dias para Graymire junto com uma caravana.\\n\\nNão fomos atacados, mas encontramos os restos de uma caravana pequena no caminho, menos de dez pessoas.\\nPareciam mortos há 4-5 dias, já bem decompostos.\\nTinha marcas de ventosas no pescoço das pessoas ali.\\nNão foi saqueada, Dare achou dinheiro (que dividiu conosco) e um [[id:ec94e816-d38d-4170-87a1-84b4488157e7][Tankard of Sobriety]].\\n\\nChegando em Graymire, Nisos nos leva na [[id:72d1298b-2f15-49e3-8c3b-71b3309541f6][Taverna das Graças]], onde nossa estadia está coberta pelo [[id:f6ee6518-550f-4e1e-9843-fff4e7eb812b][Conselho]] da cidade.\\nA cidade está estranhamenta vazia, ainda mais pro vim de primavera e perto do festival da cidade.\\nTemos um encontro marcado com um conselheiro no dia seguinte.\\nAs pessoas nas ruas estão visivelmente apreensivas.\\n\\nChegamos na taverna, que também está estranhamente vazia, encontramos Dira o guarda de lá.\\nOuvimos que [[id:fd5c4ab6-97c9-4793-bc27-b68924b81b35][Ariadne]] não aparece na cidade há quase uma semana, estranhamente.\\n\\nAmanhã falaríamos com [[id:9017d920-7dd4-4a16-8809-82afee8413f9][Liam]], que é um centrista conciliador no conselho, acaba sendo o lider orgânico.\\n\\nEu me apresento no palco e ganho 1gp.\\nDepois janto com Dare e Lucky, Lucky aparentemente não vai agir quanto a sua atração por Nisos.\\nMuito bêbada, eu falo sobre como era no festival.\\nDare e Lucky falam em tirar as \\logseq____&quot;gorjetas\\logseq____&quot; do pessoal rico que é pão duro e não dá gorjeta normalme 51b-4281-ae6e-0e91c853cb1c][Brigada de Niridia]] para proteger as fronteiras. Sob suas ordens, a brigada caçou e dizimou o grupo de mercenários como vingança pelo saque de Fallendia.\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Glogseq____&quot;,686,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Zlogseq____&quot;,33,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Xlogseq____&quot;,33,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Wlogseq____&quot;,33,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Ilogseq____&quot;,590,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Ilogseq____&quot;,601,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Ilogseq____&quot;,604,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Ilogseq____&quot;,665,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Ilogseq____&quot;,666,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Ilogseq____&quot;,679,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^Ilogseq____&quot;,685,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[683,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc82-47ab-4118-9d74-4e435674ebd8logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[684,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Povo\\n\\nAs pessoas costumam ser muito approachable.\\nTatuagens são muito comuns.logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[684,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[684,l q____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[766,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc82-15c4-41ff-a5e0-8bc2354c541flogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[767,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Descrição do ChatGPT\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[767,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[767,logseq____&quot;^Glogseq____&quot;,770,536870917]],[logseq____&quot;^17logseq____&quot;,[767,logseq____&quot;^Zlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[767,logseq____&quot;^Xlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[767,logseq____&quot;^Wlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[767,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[767,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc82-e19e-49d5-9571-32257ac4be13logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Se juntando aos irmãos tiefling\\n\\nLyanna encontrou a Brigada em [[id:9e13a5d3-9bf1-4677-84cb-540d2144e173][Brenitte]], porém descobriu que não havia nenhuma operação interessante no momento.\\nSe fosse se juntar à organização, teria que treinar para participar ativamente das operações e fazer tarefas chatas, em vez de apenas acompanhá-los e compôr novo repertório.\\nThat did not fit her french vanilla fantasy.\\n\\nDesistindo de se juntar à Brigada, tentou ganhar dinheiro nas tavernas de Brenitte e ouvir as histórias da caça aos mercenários para cantá-las. Ambas as ideias falharam, pois já haviam bardos bem estabelecidos na cidade, saturando as tavernas locais e já tendo explorado as histórias que Lyanna recém começara a ouvir.\\n\\nApós duas semanas nessa luta, Lyanna precisa de outra fonte de dinheiro. Resolve se juntar a algum grupo de aventureiros para fazer alguns bicos. A esperança é participar o mínimo possível, delegar o máximo possível, se sustentar por algum tempo e, quem sabe, até achar inspiração pra novas canções. Fica observando um mural em [[id:9e13a5d3-9bf1-4677-84cb-540d2144e173][Brenitte]] e abordando os grupos que passam por lá, mas vários a rejeitam. Por fim, aborda [[id:9f641a40-cb99-4fad-9139-2aa5ae1274ce][Dare]] e [[Lady Luck]] e consegue semi-convencê-los a se juntar.\\n\\nAcabam indo atrás de um pedido de ajuda por um fazendeiro dos arredores da cidade cujas ovelhas estavam desaparecendo aos poucos, com sinais de ataques. Era uma das poucas tarefas que ainda estavam disponíveis. Lyanna viu vários grupos olharem para ela e, ao ver o pagamento, fazerem cara feia. No fim das contas eram três lobos que tinham se alojado perto da fazenda. Lyanna conseguiu rastrar os lobos e tentou ficar o mais fora da luta possível. Dare e Lady Luck conseguiram afugentar os lobos e destruir a toca deles, e Lyanna curou quaisquer ferimentos depois pra tentar compensar o fato de não ter participado da luta.\\n\\nNos dias seguintes Lyanna compôs uma canção embellishing essa aventura, sobre um lorde desesperado com os ataques de uma grande fera que atacava seu domínio toda a noite, devorando sempre 5 ovelhas e 2 camponeses. O lorde tentou buscar ajuda de aventureiros, mas toda vez que ele descrevia a besta monstruosa os grupos se assustavam e recusavam. Até que um dia um casal de irmãos destemidos apareceram. Segue a descrição de uma luta árdua, em que um dos irmãos é gravemente ferido e resgatado pelo outro, no fim triunfando sobre a besta. O lorde oferece vastas terras de seu domínio como recompensa, mas os irmãos recusam e aceitam apenas o ouro, pois outras aventuras os chamam.\\n\\nApós a quest, Lyanna conversou com Dare e Lady Luck, que disseram querer explorar o mundo e pretendiam ir mais a oeste, para ver lugares diferentes de onde eles vêm. Lyanna decide se juntar a eles: parece que assim ela consegue ganhar um pouco mais de dinheiro e começa a acumular experiência em aventuras. Durante a viagem, se prova útil por conhecer bem os caminhos de [[id:09a29eb0-0eb5-4856-93c4-1c913bfd1f16][Niridia]] e a sobrevivência na estrada (devido ao passado com sua trupe).\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Glogseq____&quot;,769,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Zlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Xlogseq____&quot;,773,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Wlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Wlogseq____&quot;,570,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Ilogseq____&quot;,570,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Ilogseq____&quot;,592,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Ilogseq____&quot;,640,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^Ilogseq____&quot;,658,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[768,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc82-5556-43d2-8f25-4c438037f179logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Na estrada com uma trupe\\n\\nPouco depois de seu décimo-sexto aniversário, porém, sua vida mudou com a visita de uma trupe musical. Eles haviam tentado atalhar o seu caminho e se perderam pelos campos de Niridia, indo parar nessa região que raramente via esse tipo de grupo. Essa trupe trouxe consigo muitas histórias, canções e números que ninguém na vila jamais havia visto, capturando sua total atenção por uma longa noite.\\n\\nDecidida que essa seria a sua vida a partir de agora, Lyanna fugiu de casa no dia seguinte e seguiu a trupe de longe por alguns dias, se escondendo nas plantações de trigo que estavam no auge de seu crescimento. Durante esses dias e noites, observou a trupe de longe e absorveu tudo o que podia de seus ensaios.\\n\\nQuando chegaram na vila mais próxima, três dias depois, a trupe repetiu sua performance noturna. Em um dos seus números preferidos, Lyanna entrou no meio com sua flauta improvisada e um acompanhamento de sua criação. Apesar da surpresa da trupe, a performance foi muito bem recebida, e com isso ela pôde de fato se juntar ao grupo.\\n\\nOs quatro anos seguintes se passaram vagando por Niridia, memorizando novas histórias e canções, aperfeiçoando suas habilidades musicais. Com o tempo, Lyanna passou a se sentir estagnada, percebendo que sua trupe trazia o mesmo repertório que qualquer outra. De fato, se via a decepção do público quando outro grupo se apresentara há poucos dias, demandando que a trupe desviasse seu caminho para garantir que ganharia algumas moedas.\\n\\nLyanna queria mais, queria se destacar. A oportunidade para isso veio com o crescimento das hostilidades entre Niridia e [[id:7d3d42d3-be4b-4bce-b24b-8cc555a5c8a8][Khreven]]. Tais conflitos são repletos de tragédias e heroísmo, de bravas lutas e covardes truques. O melhor material para canções de todos os tipos.\\n\\nDeterminada a ser uma pioneira em relatar essas novas histórias, Lyanna se separou da trupe e procurou a [[id:389c7ba3-a51b-4281-ae6e-0e91c853cb1c][Brigada de Niridia]].\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^Glogseq____&quot;,771,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^Zlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^Xlogseq____&quot;,773,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^Wlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^Ilogseq____&quot;,590,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^Ilogseq____&quot;,679,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[769,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc82-268a-4132-bb94-80770281ddbclogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[770,logseq____&quot;^Slogseq____&quot;,logseq____&quot;[[../../assets/lyanna_1668889018695_0.jpg]]\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[770,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[770,logseq____&quot;^Glogseq____&quot;,766,536870917]],[logseq____&quot;^17logseq____&quot;,[770,logseq____&quot;^Zlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[770,logseq____&quot;^Xlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[770,logseq____&quot;^Wlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[770,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[770,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc82-70c2-4935-b7d3-d5fab62cd3felogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^Slogseq____&quot;,logseq____&quot;Crescendo na fazenda\\n\\nLyanna é a filha mais velha de um casal de fazendeiros no interior de [[Niridia]]. Desde pequena demonstrou talento e interesse para música, cantando e criando seus próprios instrumentos rudimentares (uma flauta feita de um galho, um tambor de um pedaço oco de tronco). Esse era seu modo de competir por atenção, o que muitas vezes era difícil dado que tinha 6 irmãos e irmãs mais novos.\\n\\nLogo no início de sua puberdade, ela começou também a desenvolver habilidades telepáticas. Na primeira vez que ela tocou a mente de outra pessoa, um de seus irmãos mais novos, isso o assustou muito. Ela conseguiu persuadir o irmão de que fora um simples truque projetando sua voz, e desde então foi bastante cuidadosa no uso dessa habilidade.\\n\\nPor outro lado, ela entrava na mente dos outros sempre que possível. Isso a ajudava a entender como melhor capturar a atenção de todos com sua música.\\n\\nAssim foi sua vida até cerca de 16 anos: uma rotina monótona na fazenda, uma busca quase desesperada por atenção e o aperfeiçoamento autodidata de suas habilidades musicais. Também cuidava bastante de seus irmãos e irmãs, desenvolvendo um instinto quase maternal. Por outro lado, evitava todas as tarefas chatas ou manuais que podia, delegando para algum de seus irmãos e irmãs.\\nlogseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;^1?logseq____&quot;,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^Glogseq____&quot;,773,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^Zlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^Xlogseq____&quot;,773,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^Wlogseq____&quot;,33,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^Wlogseq____&quot;,69,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^Ilogseq____&quot;,33,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^1=logseq____&quot;,true,536870917]],[logseq____&quot;^17logseq____&quot;,[771,logseq____&quot;^logseq____&lt;logseq____&quot;,logseq____&quot;~u640dfc82-e947-4b96-8432-0da10fafe4bdlogseq____&quot;,536870917]],[log       // This script checks to see if a redirect is present in the query string
